services:
  - type: web
    name: f1-ai-platform
    runtime: python
    plan: free
    dockerfilePath: ./Dockerfile.render
    dockerContext: .
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DB_HOST
        sync: false  # Set in Render dashboard
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        value: postgres
      - key: DB_USER
        value: postgres
      - key: DB_PASSWORD
        sync: false  # Set in Render dashboard
      - key: DB_SSL_MODE
        value: require
      - key: JWT_SECRET_KEY
        generateValue: true  # Auto-generate
      - key: API_KEY
        generateValue: true
      - key: PYTHONPATH
        value: /app
      - key: WEB_CONCURRENCY
        value: "1"  # Single worker to save memory
    healthCheckPath: /health
    autoDeploy: true

disk:
  name: f1-data
  mountPath: /app/data
  sizeMB: 500