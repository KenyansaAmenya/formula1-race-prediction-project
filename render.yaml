services:
  - type: web
    name: f1-api
    runtime: python
    plan: free 
    buildCommand: |
      pip install --no-cache-dir -r requirements.txt
      python src/models/train.py  # Pre-train if no models exist
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DB_SSL_MODE
        value: require
    disk:
      name: model-storage
      mountPath: /opt/render/project/src/artifacts
      sizeGB: 1 
    healthCheckPath: /health/live